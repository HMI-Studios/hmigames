<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  </header>

  <main class="container">
    <div class="d-flex justify-between align-end">
      <h2>Hex Snake</h2>
      <p>
        <a onclick="document.querySelector('#game').requestFullscreen()">⛶ Fullscreen</a>
      </p>
    </div>

    <div class="game-frame">
      <iframe id="game" src="build" title="Game" allow="fullscreen"></iframe>

    <div class="below-game">
      <div>
        <p>
          Snake, but on a hex grid (because hexagons are the bestagons).<br>
          <h3>Instructions</h3>
          Left and right arrow keys to steer. Eat as many apples as possible while avoiding the skulls, and don't crash into yourself!
        </p>
      </div>
      <aside class="ad-box tall">
        <!-- HMI Sidebar Ad -->
        <ins class="adsbygoogle"

            data-full-width-responsive="true"></ins>

            (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
